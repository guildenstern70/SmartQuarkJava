<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartQuark Java Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

    <div class="h-screen flex items-center justify-center bg-gradient-to-r from-blue-500 to-indigo-600 text-white">
        <div class="text-center px-4">
            <h1 class="text-5xl md:text-6xl font-extrabold mb-6 drop-shadow-lg">
                SmartQuark Java Edition
            </h1>
            <p class="text-xl md:text-2xl mb-12 max-w-3xl mx-auto leading-relaxed">
                SmartQuark is a production-ready microservice template using Quarkus, Hibernate Panache and SmallRye GraphQL.
                It fully support OpenAPI specifications. Start building REST APIs quickly with sensible defaults and examples.
            </p>
            <div class="flex flex-wrap justify-center gap-4">
                <a href="/q/openapi" class="bg-white text-blue-600 px-8 py-3 rounded-full font-bold shadow-lg hover:bg-blue-50 transition duration-300">
                    Explore API
                </a>
                <a href="/q/graphql-ui" class="bg-indigo-700 text-white px-8 py-3 rounded-full font-bold shadow-lg hover:bg-indigo-800 transition duration-300">
                    GraphQl
                </a>
                <a href="/q/health" class="bg-green-500 text-white px-8 py-3 rounded-full font-bold shadow-lg hover:bg-green-600 transition duration-300">
                    Health
                </a>
                <a href="/q/dev" class="bg-gray-800 text-white px-8 py-3 rounded-full font-bold shadow-lg hover:bg-gray-900 transition duration-300">
                    Dev
                </a>
                <a href="/q/openapi" class="border-2 border-white text-white px-8 py-3 rounded-full font-bold shadow-lg hover:bg-white hover:text-blue-600 transition duration-300">
                    Download API
                </a>
            </div>
        </div>
    </div>

</body>
</html>
